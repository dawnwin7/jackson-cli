name: cli-release

on:
  push:
    tags:
      - 'cli-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'SemVer version to release without the cli-v prefix'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: cli-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package_dir: packages/cli-linux-x64-gnu
            asset: jackson-linux-x64-gnu
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            package_dir: packages/cli-linux-arm64-gnu
            asset: jackson-linux-arm64-gnu
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            package_dir: packages/cli-darwin-x64
            asset: jackson-darwin-x64
          - target: aarch64-apple-darwin
            runner: macos-latest
            package_dir: packages/cli-darwin-arm64
            asset: jackson-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            package_dir: packages/cli-win32-x64-msvc
            asset: jackson-win32-x64-msvc
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#cli-v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $VERSION" >&2
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Apply release version
        shell: bash
        run: node packages/cli/scripts/set-release-version.mjs "$VERSION"

      - name: Test CLI
        run: pnpm --filter @dawnwin7/jackson-cli test

      - name: Build CLI binary
        run: cargo build --manifest-path packages/cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Stage platform package
        run: node packages/cli/scripts/stage-platform-package.mjs --target ${{ matrix.target }}

      - name: Pack platform npm package
        shell: bash
        run: |
          mkdir -p package-tarballs
          npm pack "./${{ matrix.package_dir }}" --pack-destination package-tarballs

      - name: Build release archive
        shell: bash
        run: node packages/cli/scripts/make-release-archive.mjs --target ${{ matrix.target }} --version "$VERSION"

      - name: Upload platform npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball-${{ matrix.asset }}
          path: package-tarballs/*.tgz
          if-no-files-found: error

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-${{ matrix.asset }}
          path: release-assets/*
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Download platform packages
        uses: actions/download-artifact@v5
        with:
          pattern: package-tarball-*
          path: package-tarballs
          merge-multiple: true

      - name: Resolve release version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#cli-v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Apply release version
        shell: bash
        run: node packages/cli/scripts/set-release-version.mjs "$VERSION"

      - name: Pack main npm package
        run: npm pack ./packages/cli --pack-destination package-tarballs

      - name: Publish platform packages
        shell: bash
        run: |
          publish_if_needed() {
            local platform_tag="$1"
            local package_version="$VERSION-$platform_tag"
            local tarball="package-tarballs/dawnwin7-jackson-cli-$package_version.tgz"

            if npm view "@dawnwin7/jackson-cli@$package_version" version >/dev/null 2>&1; then
              echo "Skipping already-published @dawnwin7/jackson-cli@$package_version"
            else
              npm publish "./$tarball" --access public --provenance --tag "$platform_tag"
            fi
          }

          publish_if_needed "darwin-arm64"
          publish_if_needed "darwin-x64"
          publish_if_needed "linux-arm64-gnu"
          publish_if_needed "linux-x64-gnu"
          publish_if_needed "win32-x64-msvc"

      - name: Publish main package
        shell: bash
        run: |
          main_package="package-tarballs/dawnwin7-jackson-cli-$VERSION.tgz"
          if npm view "@dawnwin7/jackson-cli@$VERSION" version >/dev/null 2>&1; then
            echo "Skipping already-published @dawnwin7/jackson-cli@$VERSION"
          else
            npm publish "./$main_package" --access public --provenance
          fi

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-asset-*
          path: release-assets
          merge-multiple: true

      - name: Resolve release version
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            TAG="cli-v$VERSION"
          else
            VERSION="${GITHUB_REF_NAME#cli-v}"
            TAG="$GITHUB_REF_NAME"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" release-assets/* --title "Jackson CLI $VERSION" --notes "Jackson CLI $VERSION" --repo "$GITHUB_REPOSITORY"
          fi
