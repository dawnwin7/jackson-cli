name: api-release

on:
  push:
    tags:
      - 'api-v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API to FastAPI Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test API
        working-directory: apps/api
        env:
          JACKSON_TEST_MODE: 'true'
        run: uv run pytest

      - name: Deploy API
        working-directory: apps/api
        env:
          FASTAPI_CLOUD_TOKEN: ${{ secrets.FASTAPI_CLOUD_TOKEN }}
          FASTAPI_CLOUD_APP_ID: ${{ secrets.FASTAPI_CLOUD_APP_ID }}
        run: uv run fastapi deploy
